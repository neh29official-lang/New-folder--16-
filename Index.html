<!DOCTYPE html>
<html lang="en">
    <body>
        <h2>JavaScript Call stack </h2>
    <p>Do a calculation then displaythe result</p>
    <p id="demo"></p>
        <script>
    function add(a, b) {
        return a + b;
    }
    function average(a, b) {
        return add(a, b) / 2;
    }
    document.getElementById("demo").innerHTML = "The result is : " + average(5, 15);
        </script>
 
   </body>
   </html>
